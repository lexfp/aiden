<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNTERS</title>
    <link rel="icon" href="./Paintball-Gun-1024x576.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #07070f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column
        }

        .screen.active {
            display: flex
        }

        #s-menu {
            background: linear-gradient(135deg, #07070f 0%, #12062a 50%, #070f07 100%)
        }

        .title {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 14px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff3333, #ff8800, #ffdd00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px
        }

        .subtitle {
            color: #555;
            font-size: 12px;
            letter-spacing: 6px;
            margin-bottom: 60px
        }

        .btn {
            padding: 14px 44px;
            margin: 7px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            transition: all .15s;
            min-width: 240px
        }

        .btn-p {
            background: linear-gradient(90deg, #ff3333, #ff7700);
            color: #fff
        }

        .btn-p:hover {
            transform: scale(1.05);
            filter: brightness(1.2)
        }

        .btn-s {
            background: rgba(255, 255, 255, .08);
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, .15)
        }

        .btn-s:hover {
            background: rgba(255, 255, 255, .16);
            color: #fff
        }

        .btn-d {
            background: rgba(255, 50, 50, .15);
            color: #ff6666;
            border: 1px solid rgba(255, 50, 50, .3)
        }

        .btn-d:hover {
            background: rgba(255, 50, 50, .25);
            color: #ff9999
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: none
        }

        #hud.active {
            display: block
        }

        #xhair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            pointer-events: none
        }

        #xhair::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, .8)
        }

        #xhair::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, .8)
        }

        #hp-bar {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 200px
        }

        #hp-lbl {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 4px
        }

        #hp-track {
            height: 5px;
            background: rgba(255, 255, 255, .1);
            border-radius: 3px
        }

        #hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff7700);
            border-radius: 3px;
            width: 100%;
            transition: width .1s
        }

        #hp-val {
            font-size: 24px;
            font-weight: 900;
            margin-top: 4px
        }

        #ammo-d {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right
        }

        #ammo-c {
            font-size: 52px;
            font-weight: 900;
            line-height: 1
        }

        #ammo-m {
            font-size: 18px;
            color: #555
        }

        #wep-name {
            font-size: 11px;
            color: #888;
            letter-spacing: 3px;
            margin-top: 4px
        }

        #coins-d {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 18px;
            font-weight: 700;
            color: #ffd700
        }

        #match-d {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            letter-spacing: 3px;
            text-align: center
        }

        #kfeed {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none
        }

        .kmsg {
            font-size: 15px;
            font-weight: 700;
            color: #ff7744;
            animation: fu 2s forwards;
            display: block
        }

        @keyframes fu {
            0% {
                opacity: 1;
                transform: translateY(0)
            }

            100% {
                opacity: 0;
                transform: translateY(-30px)
            }
        }

        #dmg-ov {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255, 0, 0, .55) 100%);
            opacity: 0;
            transition: opacity .1s
        }

        #reload-ind {
            position: absolute;
            bottom: 110px;
            right: 40px;
            font-size: 11px;
            letter-spacing: 3px;
            color: #ffd700;
            display: none
        }

        #scope-ov {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7;
            display: none;
            background: radial-gradient(circle 260px at 50% 50%, transparent 250px, #000 260px)
        }

        /* shop */
        #s-shop {
            background: #07070f;
            overflow-y: auto;
            padding: 40px;
            align-items: flex-start;
            justify-content: flex-start
        }

        .shop-wrap {
            width: 100%;
            max-width: 980px;
            margin: 0 auto
        }

        .shop-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px
        }

        .shop-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px
        }

        .shop-coins {
            font-size: 20px;
            color: #ffd700;
            font-weight: 700
        }

        .cat-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .cat-tab {
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
            transition: all .15s
        }

        .cat-tab:hover,
        .cat-tab.active {
            border-color: #ff7700;
            color: #ff7700;
            background: rgba(255, 119, 0, .1)
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 14px
        }

        .wcard {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: 14px;
            cursor: pointer;
            transition: all .15s
        }

        .wcard:hover {
            background: rgba(255, 255, 255, .08);
            border-color: rgba(255, 119, 0, .4)
        }

        .wcard.owned {
            border-color: rgba(100, 255, 100, .3);
            background: rgba(100, 255, 100, .04)
        }

        .wcard.equipped {
            border-color: #ff7700;
            background: rgba(255, 119, 0, .08)
        }

        .wcard-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 3px
        }

        .wcard-cat {
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px
        }

        .wcard-stat {
            font-size: 10px;
            color: #888;
            margin: 2px 0
        }

        .wcard-stat b {
            color: #ccc
        }

        .wcard-price {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #ffd700
        }

        .wcard-price.free {
            color: #66ff66
        }

        .wcard-tag {
            margin-top: 6px;
            font-size: 10px;
            letter-spacing: 1px
        }

        /* loadout */
        #s-loadout {
            background: #07070f
        }

        .lo-wrap {
            display: flex;
            gap: 24px;
            margin-top: 24px
        }

        .lo-slot {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: 18px;
            width: 220px
        }

        .lo-slot-title {
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 10px
        }

        .lo-wep {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .lo-stats {
            font-size: 11px;
            color: #888;
            line-height: 1.6
        }

        .lo-list {
            margin-top: 10px;
            max-height: 180px;
            overflow-y: auto
        }

        .lo-item {
            padding: 7px 8px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            transition: background .1s;
            border: 1px solid transparent
        }

        .lo-item:hover {
            background: rgba(255, 255, 255, .08)
        }

        .lo-item.sel {
            background: rgba(255, 119, 0, .15);
            border-color: rgba(255, 119, 0, .3);
            color: #ff9944
        }

        .lo-item.lock {
            opacity: .35;
            cursor: not-allowed
        }

        /* map/diff select */
        #s-preplay {
            background: #07070f;
            overflow-y: auto;
            padding: 30px 20px;
            align-items: flex-start
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 150px));
            gap: 12px;
            margin-bottom: 24px;
            max-width: 900px
        }

        .mcard {
            background: rgba(255, 255, 255, .04);
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: 16px 12px;
            cursor: pointer;
            transition: all .15s;
            text-align: center
        }

        .mcard:hover,
        .mcard.sel {
            border-color: #ff7700;
            background: rgba(255, 119, 0, .1)
        }

        .mcard-icon {
            font-size: 32px;
            margin-bottom: 6px
        }

        .mcard-name {
            font-size: 13px;
            font-weight: 700
        }

        .mcard-size {
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
            margin-top: 2px
        }

        .diff-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px
        }

        .dcard {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 4px;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
            min-width: 90px
        }

        .dcard:hover,
        .dcard.sel {
            border-color: #ff7700;
            background: rgba(255, 119, 0, .1)
        }

        .dcard-name {
            font-size: 13px;
            font-weight: 700
        }

        .dcard-desc {
            font-size: 10px;
            color: #888;
            margin-top: 2px
        }

        .bc-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px
        }

        .bcbtn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            transition: all .15s
        }

        .bcbtn:hover,
        .bcbtn.sel {
            border-color: #ff7700;
            color: #ff7700;
            background: rgba(255, 119, 0, .1)
        }

        /* gameover */
        #s-over {
            background: rgba(0, 0, 0, .9)
        }

        #res-title {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 16px
        }

        .r-win {
            color: #44ff88
        }

        .r-loss {
            color: #ff3333
        }

        #res-stats {
            color: #888;
            font-size: 15px;
            margin-bottom: 36px;
            line-height: 2;
            text-align: center
        }

        /* pause */
        #s-pause {
            background: rgba(0, 0, 0, .75)
        }

        /* notif */
        #notif {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, .9);
            border: 1px solid rgba(255, 255, 255, .15);
            padding: 11px 24px;
            border-radius: 3px;
            font-size: 13px;
            z-index: 100;
            display: none;
            letter-spacing: 1px
        }

        /* pointer lock msg */
        #ptr-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .85);
            padding: 20px 44px;
            border-radius: 8px;
            text-align: center;
            z-index: 20;
            display: none;
            color: #aaa;
            font-size: 14px;
            letter-spacing: 2px
        }

        h2 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 24px
        }

        .sec-lbl {
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
            margin: 16px 0 8px
        }

        ::-webkit-scrollbar {
            width: 3px
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, .04)
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .15)
        }

        /* Rarity tiers */
        .badge-tier {
            display: inline-block;
            font-size: 8px;
            letter-spacing: 2px;
            padding: 1px 5px;
            border-radius: 2px;
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-common {
            background: rgba(150, 150, 150, .15);
            color: #aaa;
        }

        .badge-rare {
            background: rgba(68, 153, 255, .15);
            color: #4499ff;
        }

        .badge-epic {
            background: rgba(170, 68, 255, .15);
            color: #aa44ff;
        }

        .badge-legendary {
            background: rgba(255, 153, 0, .2);
            color: #ff9900;
        }

        .wcard.tier-rare {
            border-color: rgba(68, 153, 255, .35);
        }

        .wcard.tier-epic {
            border-color: rgba(170, 68, 255, .4);
        }

        .wcard.tier-legendary {
            border-color: rgba(255, 153, 0, .5);
        }

        /* Charge indicator */
        #charge-ind {
            position: absolute;
            bottom: 140px;
            right: 40px;
            font-size: 11px;
            letter-spacing: 3px;
            color: #ffaa00;
            display: none;
            font-weight: 700;
        }

        /* Wave / mode HUD */
        #wave-d {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #88ff44;
            letter-spacing: 3px;
            font-weight: 700;
            display: none;
        }

        #timer-d {
            position: absolute;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ffdd00;
            letter-spacing: 4px;
            font-weight: 900;
            display: none;
        }

        #powerup-d {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #44ffff;
            letter-spacing: 2px;
            display: none;
        }

        #boost-d {
            position: absolute;
            top: 20px;
            left: 40px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #44ff88;
        }

        /* Character cards */
        .ccard {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
            width: 120px;
        }

        .ccard:hover,
        .ccard.sel {
            border-color: #ff7700;
            background: rgba(255, 119, 0, .08);
        }

        .ccard-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .ccard-name {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .ccard-desc {
            font-size: 9px;
            color: #888;
            letter-spacing: 1px;
        }

        .ccard-price {
            font-size: 10px;
            color: #ffd700;
            margin-top: 4px;
        }

        /* Game mode cards */
        .gcard {
            background: rgba(255, 255, 255, .04);
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 6px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all .15s;
            text-align: center;
            min-width: 120px;
        }

        .gcard:hover,
        .gcard.sel {
            border-color: #ff7700;
            background: rgba(255, 119, 0, .1);
        }

        .gcard-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .gcard-name {
            font-size: 12px;
            font-weight: 700;
        }

        .gcard-desc {
            font-size: 9px;
            color: #888;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* Char row layout */
        .char-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .mode-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: stretch;
        }

        .preplay-panel {
            width: min(900px, calc(100vw - 32px));
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            padding: 16px 8px 24px;
        }

        @media (max-width: 700px) {
            .gcard {
                flex: 1 1 180px;
                min-width: 0;
            }
        }

        /* Hit marker */
        .hitmark {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 2px solid #ff3333;
            border-radius: 50%;
            opacity: 0;
            animation: hitpop .25s ease-out forwards;
            z-index: 8;
        }

        @keyframes hitpop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.8);
            }
        }

        /* Kill indicator */
        #kill-ind {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -70px);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ff3333;
            font-weight: 700;
            opacity: 0;
            transition: opacity .1s;
            pointer-events: none
        }

        /* progress bar for stats */
        .stat-bar {
            height: 3px;
            background: rgba(255, 255, 255, .1);
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff7700);
            border-radius: 2px
        }
    </style>
</head>

<body>

    <!-- SCREENS -->
    <div id="s-menu" class="screen active">
        <div class="title">HUNTERS</div>
        <div class="subtitle">ARENA COMBAT</div>
        <button class="btn btn-p" onclick="G.showPreplay()">PLAY</button>
        <button class="btn btn-s" onclick="G.showScreen('s-loadout')">LOADOUT</button>
        <button class="btn btn-s" onclick="G.showScreen('s-shop')">SHOP</button>
    </div>

    <div id="s-preplay" class="screen">
        <div class="preplay-panel">
            <h2>SELECT MATCH</h2>
            <div class="sec-lbl">GAME MODE</div>
            <div class="mode-row" id="mode-row"></div>
            <div class="sec-lbl">MAP</div>
            <div class="map-grid" id="map-grid"></div>
            <div class="sec-lbl">DIFFICULTY</div>
            <div class="diff-row" id="diff-row"></div>
            <div class="sec-lbl">BOT COUNT</div>
            <div class="bc-row" id="bc-row"></div>
            <div class="sec-lbl">CHARACTER</div>
            <div class="char-row" id="char-row"></div>
            <button class="btn btn-p" onclick="G.startMatch()">START MATCH</button>
            <button class="btn btn-s" style="margin-top:8px" onclick="G.showScreen('s-menu')">BACK</button>
        </div>
    </div>

    <div id="s-shop" class="screen">
        <div class="shop-wrap">
            <div class="shop-hdr">
                <div class="shop-title">ARMORY</div>
                <div class="shop-coins">ðŸ’° <span id="shop-coins-val">0</span></div>
            </div>
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="shop-grid" id="shop-grid"></div>
            <div style="margin-top:24px;display:flex;gap:12px">
                <button class="btn btn-s" onclick="G.showScreen('s-menu')">BACK</button>
            </div>
        </div>
    </div>

    <div id="s-loadout" class="screen">
        <h2>LOADOUT</h2>
        <div class="lo-wrap">
            <div class="lo-slot" id="lo-primary">
                <div class="lo-slot-title">PRIMARY</div>
                <div class="lo-wep" id="lo-p-name">â€”</div>
                <div class="lo-stats" id="lo-p-stats"></div>
                <div class="lo-list" id="lo-p-list"></div>
            </div>
            <div class="lo-slot" id="lo-secondary">
                <div class="lo-slot-title">SECONDARY</div>
                <div class="lo-wep" id="lo-s-name">â€”</div>
                <div class="lo-stats" id="lo-s-stats"></div>
                <div class="lo-list" id="lo-s-list"></div>

    <script type="module">
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';
        window.GLTFLoader = GLTFLoader;
        window.RoomEnvironment = RoomEnvironment;
        window.SkeletonUtils = SkeletonUtils;
    </script>
    <script>
        // Minimal G fallback for UI responsiveness before full script loads
        window.G = window.G || {
            showScreen: function(id) {
                console.log('UI: showing screen', id);
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const el = document.getElementById(id);
                if (el) el.classList.add('active');
                if (id === 'hud' && !window.THREE) {
                    alert('Three.js failed to load. 3D gameplay may not work on file:/// URLs, but menus should.');
                }
            },
            showPreplay: function() { this.showScreen('s-preplay'); },
            startMatch: function() { this.showScreen('hud'); },
            init: function() { console.log('Minimal G initialized'); }
        };
    </script>
