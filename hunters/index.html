<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNTERS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070f;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}
#s-menu{background:linear-gradient(135deg,#07070f 0%,#12062a 50%,#070f07 100%)}
.title{font-size:80px;font-weight:900;letter-spacing:14px;text-transform:uppercase;background:linear-gradient(90deg,#ff3333,#ff8800,#ffdd00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{color:#555;font-size:12px;letter-spacing:6px;margin-bottom:60px}
.btn{padding:14px 44px;margin:7px;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;transition:all .15s;min-width:240px}
.btn-p{background:linear-gradient(90deg,#ff3333,#ff7700);color:#fff}
.btn-p:hover{transform:scale(1.05);filter:brightness(1.2)}
.btn-s{background:rgba(255,255,255,.08);color:#bbb;border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{background:rgba(255,255,255,.16);color:#fff}
.btn-d{background:rgba(255,50,50,.15);color:#ff6666;border:1px solid rgba(255,50,50,.3)}
.btn-d:hover{background:rgba(255,50,50,.25);color:#ff9999}
/* HUD */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;display:none}
#hud.active{display:block}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none}
#xhair::before{content:'';position:absolute;width:2px;height:100%;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.8)}
#xhair::after{content:'';position:absolute;width:100%;height:2px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.8)}
#hp-bar{position:absolute;bottom:40px;left:40px;width:200px}
#hp-lbl{font-size:10px;color:#888;letter-spacing:3px;margin-bottom:4px}
#hp-track{height:5px;background:rgba(255,255,255,.1);border-radius:3px}
#hp-fill{height:100%;background:linear-gradient(90deg,#ff3333,#ff7700);border-radius:3px;width:100%;transition:width .1s}
#hp-val{font-size:24px;font-weight:900;margin-top:4px}
#ammo-d{position:absolute;bottom:40px;right:40px;text-align:right}
#ammo-c{font-size:52px;font-weight:900;line-height:1}
#ammo-m{font-size:18px;color:#555}
#wep-name{font-size:11px;color:#888;letter-spacing:3px;margin-top:4px}
#coins-d{position:absolute;top:20px;right:40px;font-size:18px;font-weight:700;color:#ffd700}
#match-d{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:12px;color:#666;letter-spacing:3px;text-align:center}
#kfeed{position:absolute;top:60px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none}
.kmsg{font-size:15px;font-weight:700;color:#ff7744;animation:fu 2s forwards;display:block}
@keyframes fu{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
#dmg-ov{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,.55) 100%);opacity:0;transition:opacity .1s}
#reload-ind{position:absolute;bottom:110px;right:40px;font-size:11px;letter-spacing:3px;color:#ffd700;display:none}
#scope-ov{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:7;display:none;background:radial-gradient(circle 260px at 50% 50%,transparent 250px,#000 260px)}
/* shop */
#s-shop{background:#07070f;overflow-y:auto;padding:40px;align-items:flex-start;justify-content:flex-start}
.shop-wrap{width:100%;max-width:980px;margin:0 auto}
.shop-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.shop-title{font-size:28px;font-weight:900;letter-spacing:5px}
.shop-coins{font-size:20px;color:#ffd700;font-weight:700}
.cat-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.cat-tab{padding:6px 16px;border:1px solid rgba(255,255,255,.15);border-radius:3px;cursor:pointer;font-size:11px;letter-spacing:2px;transition:all .15s}
.cat-tab:hover,.cat-tab.active{border-color:#ff7700;color:#ff7700;background:rgba(255,119,0,.1)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.wcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:14px;cursor:pointer;transition:all .15s}
.wcard:hover{background:rgba(255,255,255,.08);border-color:rgba(255,119,0,.4)}
.wcard.owned{border-color:rgba(100,255,100,.3);background:rgba(100,255,100,.04)}
.wcard.equipped{border-color:#ff7700;background:rgba(255,119,0,.08)}
.wcard-name{font-size:13px;font-weight:700;margin-bottom:3px}
.wcard-cat{font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.wcard-stat{font-size:10px;color:#888;margin:2px 0}
.wcard-stat b{color:#ccc}
.wcard-price{margin-top:10px;font-size:13px;font-weight:700;color:#ffd700}
.wcard-price.free{color:#66ff66}
.wcard-tag{margin-top:6px;font-size:10px;letter-spacing:1px}
/* loadout */
#s-loadout{background:#07070f}
.lo-wrap{display:flex;gap:24px;margin-top:24px}
.lo-slot{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:18px;width:220px}
.lo-slot-title{font-size:10px;color:#666;letter-spacing:3px;margin-bottom:10px}
.lo-wep{font-size:16px;font-weight:700;margin-bottom:6px}
.lo-stats{font-size:11px;color:#888;line-height:1.6}
.lo-list{margin-top:10px;max-height:180px;overflow-y:auto}
.lo-item{padding:7px 8px;cursor:pointer;border-radius:3px;font-size:12px;transition:background .1s;border:1px solid transparent}
.lo-item:hover{background:rgba(255,255,255,.08)}
.lo-item.sel{background:rgba(255,119,0,.15);border-color:rgba(255,119,0,.3);color:#ff9944}
.lo-item.lock{opacity:.35;cursor:not-allowed}
/* map/diff select */
#s-preplay{background:#07070f}
.map-grid{display:grid;grid-template-columns:repeat(5,150px);gap:12px;margin-bottom:24px}
.mcard{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:6px;padding:16px 12px;cursor:pointer;transition:all .15s;text-align:center}
.mcard:hover,.mcard.sel{border-color:#ff7700;background:rgba(255,119,0,.1)}
.mcard-icon{font-size:32px;margin-bottom:6px}
.mcard-name{font-size:13px;font-weight:700}
.mcard-size{font-size:10px;color:#666;letter-spacing:2px;margin-top:2px}
.diff-row{display:flex;gap:10px;margin-bottom:24px}
.dcard{padding:10px 20px;border:2px solid rgba(255,255,255,.1);border-radius:4px;cursor:pointer;transition:all .15s;text-align:center;min-width:90px}
.dcard:hover,.dcard.sel{border-color:#ff7700;background:rgba(255,119,0,.1)}
.dcard-name{font-size:13px;font-weight:700}
.dcard-desc{font-size:10px;color:#888;margin-top:2px}
.bc-row{display:flex;gap:8px;margin-bottom:24px}
.bcbtn{width:44px;height:44px;border:2px solid rgba(255,255,255,.1);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all .15s}
.bcbtn:hover,.bcbtn.sel{border-color:#ff7700;color:#ff7700;background:rgba(255,119,0,.1)}
/* gameover */
#s-over{background:rgba(0,0,0,.9)}
#res-title{font-size:64px;font-weight:900;letter-spacing:8px;margin-bottom:16px}
.r-win{color:#44ff88}
.r-loss{color:#ff3333}
#res-stats{color:#888;font-size:15px;margin-bottom:36px;line-height:2;text-align:center}
/* pause */
#s-pause{background:rgba(0,0,0,.75)}
/* notif */
#notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.9);border:1px solid rgba(255,255,255,.15);padding:11px 24px;border-radius:3px;font-size:13px;z-index:100;display:none;letter-spacing:1px}
/* pointer lock msg */
#ptr-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);padding:20px 44px;border-radius:8px;text-align:center;z-index:20;display:none;color:#aaa;font-size:14px;letter-spacing:2px}
h2{font-size:24px;font-weight:900;letter-spacing:5px;margin-bottom:24px}
.sec-lbl{font-size:10px;color:#666;letter-spacing:3px;margin:16px 0 8px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:rgba(255,255,255,.04)}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
/* kill indicator */
#kill-ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-70px);font-size:13px;letter-spacing:3px;color:#ff3333;font-weight:700;opacity:0;transition:opacity .1s;pointer-events:none}
/* progress bar for stats */
.stat-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:3px;overflow:hidden}
.stat-fill{height:100%;background:linear-gradient(90deg,#ff3333,#ff7700);border-radius:2px}
</style>
</head>
<body>

<!-- SCREENS -->
<div id="s-menu" class="screen active">
  <div class="title">HUNTERS</div>
  <div class="subtitle">ARENA COMBAT</div>
  <button class="btn btn-p" onclick="G.showPreplay()">PLAY</button>
  <button class="btn btn-s" onclick="G.showScreen('s-loadout')">LOADOUT</button>
  <button class="btn btn-s" onclick="G.showScreen('s-shop')">SHOP</button>
</div>

<div id="s-preplay" class="screen">
  <h2>SELECT MATCH</h2>
  <div class="sec-lbl">MAP</div>
  <div class="map-grid" id="map-grid"></div>
  <div class="sec-lbl">DIFFICULTY</div>
  <div class="diff-row" id="diff-row"></div>
  <div class="sec-lbl">BOT COUNT</div>
  <div class="bc-row" id="bc-row"></div>
  <button class="btn btn-p" onclick="G.startMatch()">START MATCH</button>
  <button class="btn btn-s" style="margin-top:8px" onclick="G.showScreen('s-menu')">BACK</button>
</div>

<div id="s-shop" class="screen">
  <div class="shop-wrap">
    <div class="shop-hdr">
      <div class="shop-title">ARMORY</div>
      <div class="shop-coins">💰 <span id="shop-coins-val">0</span></div>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="shop-grid" id="shop-grid"></div>
    <div style="margin-top:24px;display:flex;gap:12px">
      <button class="btn btn-s" onclick="G.showScreen('s-menu')">BACK</button>
    </div>
  </div>
</div>

<div id="s-loadout" class="screen">
  <h2>LOADOUT</h2>
  <div class="lo-wrap">
    <div class="lo-slot" id="lo-primary">
      <div class="lo-slot-title">PRIMARY</div>
      <div class="lo-wep" id="lo-p-name">—</div>
      <div class="lo-stats" id="lo-p-stats"></div>
      <div class="lo-list" id="lo-p-list"></div>
    </div>
    <div class="lo-slot" id="lo-secondary">
      <div class="lo-slot-title">SECONDARY</div>
      <div class="lo-wep" id="lo-s-name">—</div>
      <div class="lo-stats" id="lo-s-stats"></div>
      <div class="lo-list" id="lo-s-list"></div>
    </div>
    <div class="lo-slot" id="lo-melee">
      <div class="lo-slot-title">MELEE</div>
      <div class="lo-wep" id="lo-m-name">—</div>
      <div class="lo-stats" id="lo-m-stats"></div>
      <div class="lo-list" id="lo-m-list"></div>
    </div>
  </div>
  <button class="btn btn-s" style="margin-top:24px" onclick="G.showScreen('s-menu')">BACK</button>
</div>

<div id="s-over" class="screen">
  <div id="res-title">—</div>
  <div id="res-stats"></div>
  <button class="btn btn-p" onclick="G.showPreplay()">PLAY AGAIN</button>
  <button class="btn btn-s" onclick="G.showScreen('s-menu')">MAIN MENU</button>
</div>

<div id="s-pause" class="screen">
  <h2>PAUSED</h2>
  <button class="btn btn-p" onclick="G.resume()">RESUME</button>
  <button class="btn btn-s" onclick="G.endMatch(false,true)">QUIT MATCH</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="xhair"></div>
  <div id="hp-bar">
    <div id="hp-lbl">HEALTH</div>
    <div id="hp-track"><div id="hp-fill"></div></div>
    <div id="hp-val">100</div>
  </div>
  <div id="ammo-d">
    <div id="ammo-c">17</div>
    <div id="ammo-m">/ 17</div>
    <div id="wep-name">GLOCK 17</div>
  </div>
  <div id="coins-d">💰 <span id="hud-coins">0</span></div>
  <div id="match-d"><span id="bots-alive">0</span> ENEMIES</div>
  <div id="kfeed"></div>
  <div id="kill-ind">ELIMINATED</div>
  <div id="reload-ind">RELOADING...</div>
</div>

<div id="dmg-ov"></div>
<div id="scope-ov"></div>
<div id="notif"></div>
<div id="ptr-msg">CLICK TO AIM<br><small style="font-size:10px;color:#555;letter-spacing:2px">ESC TO PAUSE</small></div>

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playShot(weapon){
  const ctx=getAudio();
  const buf=ctx.createBuffer(1,ctx.sampleRate*.08,ctx.sampleRate);
  const data=buf.getChannelData(0);
  const isMelee=weapon&&weapon.cat==='melee';
  const isSniper=weapon&&weapon.cat==='sniper';
  const isShotgun=weapon&&weapon.cat==='shotgun';
  if(isMelee){
    for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*.1))*.8;
  } else {
    for(let i=0;i<data.length;i++){
      const t=i/data.length;
      data[i]=(Math.random()*2-1)*Math.exp(-t*(isSniper?8:isShotgun?6:14))*(isSniper?1.2:isShotgun?1.0:.7);
    }
  }
  const src=ctx.createBufferSource();src.buffer=buf;
  const gain=ctx.createGain();
  const baseGain=isMelee?.4:isSniper?1.2:isShotgun?.9:.6;
  gain.gain.setValueAtTime(baseGain,ctx.currentTime);
  const filter=ctx.createBiquadFilter();
  filter.type='lowpass';
  filter.frequency.value=isSniper?3000:isShotgun?2500:8000;
  src.connect(filter);filter.connect(gain);gain.connect(ctx.destination);
  src.start();
}
function playHit(){
  const ctx=getAudio();
  const osc=ctx.createOscillator();const gain=ctx.createGain();
  osc.frequency.setValueAtTime(300,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+.15);
  gain.gain.setValueAtTime(.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
  osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+.15);
}
function playKill(){
  const ctx=getAudio();
  [440,550,660,880].forEach((f,i)=>{
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.frequency.value=f;gain.gain.setValueAtTime(.2,ctx.currentTime+i*.07);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.07+.15);
    osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*.07);osc.stop(ctx.currentTime+i*.07+.2);
  });
}
function playReload(){
  const ctx=getAudio();
  [[200,.08],[400,.05]].forEach(([f,d],i)=>{
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.type='square';osc.frequency.value=f;
    gain.gain.setValueAtTime(.15,ctx.currentTime+i*.15);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.15+d);
    osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*.15);osc.stop(ctx.currentTime+i*.15+d+.01);
  });
}
function playWin(){
  const ctx=getAudio();
  [523,659,784,1047].forEach((f,i)=>{
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.type='triangle';osc.frequency.value=f;
    gain.gain.setValueAtTime(.25,ctx.currentTime+i*.12);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.4);
    osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*.12);osc.stop(ctx.currentTime+i*.12+.5);
  });
}
function playLose(){
  const ctx=getAudio();
  [440,330,220].forEach((f,i)=>{
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.type='sawtooth';osc.frequency.value=f;
    gain.gain.setValueAtTime(.2,ctx.currentTime+i*.18);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.18+.3);
    osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*.18);osc.stop(ctx.currentTime+i*.18+.4);
  });
}

class Particle{
  constructor(pos,vel,color,life,size){
    const geo=new THREE.SphereGeometry(size||.04,4,4);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
    this.mesh=new THREE.Mesh(geo,mat);
    this.mesh.position.copy(pos);
    this.vel=vel.clone();
    this.life=life||.4;
    this.maxLife=this.life;
    scene.add(this.mesh);
  }
  update(dt){
    this.vel.y-=12*dt;
    this.mesh.position.addScaledVector(this.vel,dt);
    this.life-=dt;
    this.mesh.material.opacity=Math.max(0,this.life/this.maxLife);
    return this.life>0;
  }
  destroy(){scene.remove(this.mesh);}
}
const particles=[];
function spawnImpact(pos,color){
  for(let i=0;i<8;i++){
    const v=new THREE.Vector3((Math.random()-.5)*6,(Math.random())*4,(Math.random()-.5)*6);
    particles.push(new Particle(pos,v,color||0xffaa44,.3,.05));
  }
}
function spawnMuzzleFlash(pos){
  const flash=new THREE.PointLight(0xffaa44,3,3);
  flash.position.copy(pos);
  scene.add(flash);
  setTimeout(()=>scene.remove(flash),60);
}

function buildWeaponModel(wdef){
  const g=new THREE.Group();
  const catColors={pistol:0x333344,rifle:0x223322,sniper:0x224422,shotgun:0x554422,melee:0x888888,special:0x002244};
  const c=wdef.color||catColors[wdef.cat]||0x444444;
  const mat=new THREE.MeshLambertMaterial({color:c});
  const matDark=new THREE.MeshLambertMaterial({color:new THREE.Color(c).multiplyScalar(.5)});

  if(wdef.cat==='pistol'){
    const body=new THREE.Mesh(new THREE.BoxGeometry(.06,.12,.25),mat);
    const barrel=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,.2),matDark);
    barrel.position.set(0,.04,.22);
    const grip=new THREE.Mesh(new THREE.BoxGeometry(.05,.14,.08),matDark);
    grip.position.set(0,-.1,.02);
    g.add(body,barrel,grip);
  } else if(wdef.cat==='rifle'){
    const body=new THREE.Mesh(new THREE.BoxGeometry(.07,.1,.5),mat);
    const barrel=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,.3),matDark);
    barrel.position.set(0,.03,.4);
    const stock=new THREE.Mesh(new THREE.BoxGeometry(.06,.09,.2),matDark);
    stock.position.set(0,-.02,-.3);
    const mag=new THREE.Mesh(new THREE.BoxGeometry(.04,.1,.06),matDark);
    mag.position.set(0,-.1,.05);
    g.add(body,barrel,stock,mag);
  } else if(wdef.cat==='sniper'){
    const body=new THREE.Mesh(new THREE.BoxGeometry(.07,.1,.7),mat);
    const barrel=new THREE.Mesh(new THREE.BoxGeometry(.035,.035,.45),matDark);
    barrel.position.set(0,.03,.57);
    const scope=new THREE.Mesh(new THREE.BoxGeometry(.06,.06,.25),new THREE.MeshLambertMaterial({color:0x111111}));
    scope.position.set(0,.1,.1);
    const stock=new THREE.Mesh(new THREE.BoxGeometry(.06,.08,.25),matDark);
    stock.position.set(0,-.02,-.45);
    g.add(body,barrel,scope,stock);
  } else if(wdef.cat==='shotgun'){
    const body=new THREE.Mesh(new THREE.BoxGeometry(.09,.11,.55),mat);
    const barrel=new THREE.Mesh(new THREE.BoxGeometry(.08,.05,.3),matDark);
    barrel.position.set(0,.04,.42);
    const stock=new THREE.Mesh(new THREE.BoxGeometry(.07,.09,.22),matDark);
    stock.position.set(0,-.01,-.35);
    g.add(body,barrel,stock);
  } else if(wdef.cat==='melee'){
    if(wdef.id==='knife'){
      const blade=new THREE.Mesh(new THREE.BoxGeometry(.025,.01,.3),new THREE.MeshLambertMaterial({color:0xcccccc}));
      const handle=new THREE.Mesh(new THREE.BoxGeometry(.03,.03,.12),mat);
      handle.position.set(0,0,-.2);
      g.add(blade,handle);
    } else if(wdef.id==='sword'){
      const blade=new THREE.Mesh(new THREE.BoxGeometry(.025,.01,.55),new THREE.MeshLambertMaterial({color:0xccccdd}));
      const guard=new THREE.Mesh(new THREE.BoxGeometry(.12,.04,.04),mat);
      guard.position.set(0,0,-.2);
      const handle=new THREE.Mesh(new THREE.BoxGeometry(.03,.03,.16),matDark);
      handle.position.set(0,0,-.3);
      g.add(blade,guard,handle);
    } else {
      const head=new THREE.Mesh(new THREE.BoxGeometry(.18,.18,.12),mat);
      head.position.set(0,0,.2);
      const shaft=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,.5),matDark);
      g.add(head,shaft);
    }
  } else { // special
    const body=new THREE.Mesh(new THREE.BoxGeometry(.09,.1,.55),mat);
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.35,8),matDark);
    barrel.rotation.x=Math.PI/2;barrel.position.set(0,.04,.45);
    const detail=new THREE.Mesh(new THREE.BoxGeometry(.07,.07,.15),new THREE.MeshLambertMaterial({color:new THREE.Color(c).multiplyScalar(2)}));
    detail.position.set(0,0,.1);
    g.add(body,barrel,detail);
  }
  return g;
}

// ============================================================
// MAP BUILDER
// ============================================================
let mapObstacles=[];
let mapObstacleMeshes=[];
let mapDef=null;

function buildMap(mdef){
  mapObstacles=[];
  mapObstacleMeshes=[];
  mapDef=mdef;

  // Clear old map objects
  const toRemove=[];
  scene.traverse(o=>{if(o.userData.isMap)toRemove.push(o);});
  toRemove.forEach(o=>scene.remove(o));

  // Sky / fog
  scene.background=new THREE.Color(mdef.fog[0]);
  scene.fog=new THREE.FogExp2(mdef.fog[0],mdef.fog[1]);

  // Lighting
  scene.children.filter(c=>c.isLight).forEach(l=>scene.remove(l));
  const amb=new THREE.AmbientLight(mdef.ambient,1.5);
  scene.add(amb);
  const sun=new THREE.DirectionalLight(0xffffff,.8);
  sun.position.set(10,20,10);
  sun.castShadow=true;
  sun.shadow.mapSize.width=1024;sun.shadow.mapSize.height=1024;
  sun.shadow.camera.near=.1;sun.shadow.camera.far=100;
  sun.shadow.camera.left=-30;sun.shadow.camera.right=30;
  sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
  scene.add(sun);
  // Accent point light
  const accent=new THREE.PointLight(mdef.accent,2,20);
  accent.position.set(0,8,0);
  scene.add(accent);

  const bounds=mdef.bounds;

  // Floor
  const floorGeo=new THREE.PlaneGeometry(bounds*2,bounds*2,20,20);
  const floorMat=new THREE.MeshLambertMaterial({color:mdef.floor});
  const floor=new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x=-Math.PI/2;
  floor.receiveShadow=true;
  floor.userData.isMap=true;
  scene.add(floor);

  // Outer walls (invisible collision bounds - just use bounds check in code)
  // Visible border walls
  const wallMat=new THREE.MeshLambertMaterial({color:mdef.wall});
  const wallH=4,wallT=1;
  [
    [0,bounds+wallT/2,bounds*2+wallT*2,wallT],
    [0,-(bounds+wallT/2),bounds*2+wallT*2,wallT],
    [bounds+wallT/2,0,wallT,bounds*2],
    [-(bounds+wallT/2),0,wallT,bounds*2],
  ].forEach(([x,z,w,d])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,wallH,d),wallMat);
    m.position.set(x,wallH/2,z);
    m.receiveShadow=true;m.castShadow=true;
    m.userData.isMap=true;
    scene.add(m);
    // Add to obstacles
    const box=new THREE.Box3();
    box.setFromCenterAndSize(new THREE.Vector3(x,wallH/2,z),new THREE.Vector3(w,wallH,d));
    mapObstacles.push(box);
    mapObstacleMeshes.push(m);
  });

  // Obstacles
  mdef.obstacles.forEach(obs=>{
    const mat=new THREE.MeshLambertMaterial({color:obs.c||mdef.wall});
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(obs.w,obs.h,obs.d),mat);
    mesh.position.set(obs.x,obs.h/2,obs.z);
    mesh.castShadow=true;mesh.receiveShadow=true;
    mesh.userData.isMap=true;
    scene.add(mesh);
    mapObstacleMeshes.push(mesh);
    const box=new THREE.Box3();
    box.setFromCenterAndSize(new THREE.Vector3(obs.x,obs.h/2,obs.z),new THREE.Vector3(obs.w,obs.h,obs.d));
    mapObstacles.push(box);
  });

  // Add neon lights for neon map
  if(mdef.id==='neon'){
    [[0xff00ff,[-8,-8]],[0x00ffff,[8,-8]],[0xff0088,[-8,8]],[0x0088ff,[8,8]]].forEach(([col,[x,z]])=>{
      const l=new THREE.PointLight(col,1.5,15);
      l.position.set(x,3,z);
      l.userData.isMap=true;
      scene.add(l);
    });
  }
}

function collidesWithObstacle(x,z,radius){
  const testBox=new THREE.Box3(
    new THREE.Vector3(x-radius,-1,z-radius),
    new THREE.Vector3(x+radius,3,z+radius)
  );
  for(const obs of mapObstacles){
    if(obs.intersectsBox(testBox))return true;
  }
  return false;
}

function clampToBounds(x,z,r){
  const b=mapDef?mapDef.bounds-r:13;
  return{x:Math.max(-b,Math.min(b,x)),z:Math.max(-b,Math.min(b,z))};
}

const BOT_RADIUS=.4;
const BOT_HEIGHT=1.8;
const BOT_EYE=1.6;

class Bot{
  constructor(pos,diff,index){
    this.pos=pos.clone();
    this.diff=diff;
    this.maxHp=diff.hp;
    this.hp=this.maxHp;
    this.speed=diff.speed;
    this.yaw=Math.random()*Math.PI*2;
    this.state='patrol';
    this.shootTimer=diff.react+Math.random()*.5;
    this.patrolTimer=2+Math.random()*2;
    this.patrolTarget=null;
    this.steerAngle=0;
    this.steerTimer=0;
    this.alive=true;
    this.index=index;
    this.colors=[0xff4444,0x44aaff,0x44ff44,0xffaa00,0xff44ff,0x44ffff];
    this.color=this.colors[index%this.colors.length];
    this.buildMesh();
  }

  buildMesh(){
    this.group=new THREE.Group();
    // Body
    const bodyMat=new THREE.MeshLambertMaterial({color:this.color});
    const headMat=new THREE.MeshLambertMaterial({color:new THREE.Color(this.color).multiplyScalar(1.4)});
    const body=new THREE.Mesh(new THREE.BoxGeometry(.7,1.1,.35),bodyMat);
    body.position.y=.55;
    const head=new THREE.Mesh(new THREE.BoxGeometry(.4,.4,.4),headMat);
    head.position.y=1.3;
    // Arms
    const armMat=new THREE.MeshLambertMaterial({color:new THREE.Color(this.color).multiplyScalar(.7)});
    const lArm=new THREE.Mesh(new THREE.BoxGeometry(.2,.7,.2),armMat);
    lArm.position.set(-.45,.5,0);
    const rArm=new THREE.Mesh(new THREE.BoxGeometry(.2,.7,.2),armMat);
    rArm.position.set(.45,.5,0);
    // Legs
    const legMat=new THREE.MeshLambertMaterial({color:new THREE.Color(this.color).multiplyScalar(.5)});
    const lLeg=new THREE.Mesh(new THREE.BoxGeometry(.25,.8,.25),legMat);
    lLeg.position.set(-.2,-.4,0);
    const rLeg=new THREE.Mesh(new THREE.BoxGeometry(.25,.8,.25),legMat);
    rLeg.position.set(.2,-.4,0);

    this.group.add(body,head,lArm,rArm,lLeg,rLeg);
    this.group.position.copy(this.pos);
    this.group.castShadow=true;
    scene.add(this.group);

    // Health bar (sprite)
    const canvas=document.createElement('canvas');
    canvas.width=128;canvas.height=24;
    this.hbCanvas=canvas;
    this.hbCtx=canvas.getContext('2d');
    this.hbTex=new THREE.CanvasTexture(canvas);
    const hbMat=new THREE.SpriteMaterial({map:this.hbTex,transparent:true,depthTest:false});
    this.hbSprite=new THREE.Sprite(hbMat);
    this.hbSprite.scale.set(1.5,.3,1);
    this.hbSprite.position.y=2.2;
    this.group.add(this.hbSprite);
    this.updateHBar();

    // Weapon prop
    const wepGeo=new THREE.BoxGeometry(.06,.06,.4);
    const wepMat=new THREE.MeshLambertMaterial({color:0x555555});
    this.wepMesh=new THREE.Mesh(wepGeo,wepMat);
    this.wepMesh.position.set(.3,.6,.2);
    this.group.add(this.wepMesh);
  }

  updateHBar(){
    const ctx=this.hbCtx;const cv=this.hbCanvas;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(2,2,cv.width-4,cv.height-4);
    const pct=Math.max(0,this.hp/this.maxHp);
    const col=pct>.6?'#44ff66':pct>.3?'#ffcc00':'#ff3333';
    ctx.fillStyle=col;ctx.fillRect(3,3,Math.round((cv.width-6)*pct),cv.height-6);
    this.hbTex.needsUpdate=true;
  }

  update(dt,playerPos,playerBox){
    if(!this.alive)return;
    const toPlayer=new THREE.Vector3().subVectors(playerPos,this.pos);
    toPlayer.y=0;
    const dist=toPlayer.length();

    // State transitions
    if(dist<this.diff.aggroRange) this.state='chase';
    else if(this.state==='chase'&&dist>this.diff.aggroRange*1.3) this.state='patrol';

    if(dist<(this.diff.aggroRange*.6)) this.state='attack';
    else if(this.state==='attack'&&dist>this.diff.aggroRange*.9) this.state='chase';

    // Face direction
    if(this.state!=='patrol'){
      const targetYaw=Math.atan2(toPlayer.x,toPlayer.z);
      this.yaw=lerp(this.yaw,targetYaw,.08);
    }

    // Movement
    let moved=false;
    if(this.state==='chase'||this.state==='patrol'){
      let moveDir;
      if(this.state==='patrol'){
        this.patrolTimer-=dt;
        if(!this.patrolTarget||this.patrolTimer<=0){
          const b=mapDef?mapDef.bounds-2:12;
          this.patrolTarget=new THREE.Vector3((Math.random()-.5)*b*2,0,(Math.random()-.5)*b*2);
          this.patrolTimer=3+Math.random()*3;
        }
        moveDir=new THREE.Vector3().subVectors(this.patrolTarget,this.pos);
        moveDir.y=0;
        if(moveDir.length()<1)this.patrolTarget=null;
        else moveDir.normalize();
      } else {
        moveDir=toPlayer.clone().normalize();
      }

      // Obstacle avoidance
      const spd=this.state==='patrol'?this.speed*.5:this.speed;
      const step=spd*dt;
      this.steerTimer-=dt;

      let moved=false;
      const angles=[0,20,-20,40,-40,70,-70,110,-110,160];
      for(const ang of angles){
        const rad=ang*Math.PI/180;
        const dir=moveDir.clone();
        dir.applyAxisAngle(new THREE.Vector3(0,1,0),rad+this.steerAngle);
        const nx=this.pos.x+dir.x*step;
        const nz=this.pos.z+dir.z*step;
        if(!collidesWithObstacle(nx,nz,BOT_RADIUS)){
          const clamped=clampToBounds(nx,nz,BOT_RADIUS);
          this.pos.x=clamped.x;this.pos.z=clamped.z;
          this.yaw=Math.atan2(dir.x,dir.z);
          if(ang!==0&&this.steerTimer<=0){
            this.steerAngle=ang*Math.PI/180;
            this.steerTimer=.5;
          }
          moved=true;break;
        }
      }
      if(!moved&&this.steerTimer<=0){
        this.steerAngle=(Math.random()-.5)*Math.PI;
        this.steerTimer=1;
      }
    }

    // Shooting
    this.shootTimer-=dt;
    if(this.shootTimer<=0&&(this.state==='attack'||this.state==='chase')){
      this.shootTimer=this.diff.react+Math.random()*(this.diff.react*2);
      this.tryShoot(playerPos,playerBox);
    }

    // Animations
    const t=Date.now()*.003;
    if(this.state!=='patrol'||true){
      const arms=this.group.children.filter((_,i)=>i===2||i===3);
      arms.forEach((a,i)=>a.rotation.x=Math.sin(t+(i*Math.PI))*.3);
      const legs=this.group.children.filter((_,i)=>i===4||i===5);
      legs.forEach((l,i)=>l.rotation.x=Math.sin(t+(i*Math.PI))*.4);
    }

    this.group.position.copy(this.pos);
    this.group.rotation.y=this.yaw;
    this.hbSprite.material.rotation=0;
  }

  tryShoot(playerPos,playerBox){
    // Miss chance based on accuracy
    if(Math.random()>this.diff.acc)return;

    // Raytrace to player
    const dir=new THREE.Vector3().subVectors(playerPos,new THREE.Vector3(this.pos.x,BOT_EYE,this.pos.z));
    const dist=dir.length();
    dir.normalize();

    // Check if line of sight is clear
    const ray=new THREE.Raycaster(new THREE.Vector3(this.pos.x,BOT_EYE,this.pos.z),dir);
    const hits=ray.intersectObjects(mapObstacleMeshes);
    if(hits.length>0&&hits[0].distance<dist-.5)return; // blocked

    // Hit! Deal damage
    G.playerTakeDamage(15+Math.floor(Math.random()*10));

    // Visual: tracer
    spawnTracer(new THREE.Vector3(this.pos.x,BOT_EYE,this.pos.z),playerPos,this.color);
  }

  takeDamage(dmg,isHead){
    if(!this.alive)return;
    this.hp-=dmg*(isHead?2:1);
    this.updateHBar();
    // Hit flash
    this.group.children.forEach(c=>{
      if(c.material){const old=c.material.color.clone();c.material.color.set(0xffffff);setTimeout(()=>c.material.color.copy(old),80);}
    });
    if(this.hp<=0)this.die();
  }

  die(){
    this.alive=false;
    // Death animation - fall over
    const tween=(elapsed)=>{
      const t=Math.min(1,elapsed/400);
      this.group.rotation.z=t*(Math.PI/2);
      this.group.position.y=-t*.5;
      if(t<1)requestAnimationFrame(()=>tween(elapsed+16));
      else setTimeout(()=>scene.remove(this.group),1500);
    };
    tween(0);
  }
}

function spawnTracer(from,to,color){
  const dir=new THREE.Vector3().subVectors(to,from);
  const len=dir.length();
  const mid=new THREE.Vector3().addVectors(from,to).multiplyScalar(.5);
  const geo=new THREE.BoxGeometry(.02,.02,len);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.6});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(mid);
  mesh.lookAt(to);
  scene.add(mesh);
  setTimeout(()=>scene.remove(mesh),100);
}

function lerp(a,b,t){return a+(b-a)*t;}

const G={

  // Match state
  bots:[],
  playerHp:100,
  playerMaxHp:100,
  playerPos:new THREE.Vector3(0,0,0),
  playerYaw:0,
  playerPitch:0,

  onGround:true,
  // Weapon state

  currentMag:0,
  isReloading:false,
  reloadTimer:0,
  fireTimer:0,
  scopeMode:false,

  // Input

  matchDmgDealt:0,

    document.getElementById('hud').classList.remove('active');

    if(id==='s-loadout')this.buildLoadoutUI();

  showPreplay(){
    this.buildPreplayUI();
    this.showScreen('s-preplay');
  },

  showNotif(msg,dur=2000){
    const n=document.getElementById('notif');
    n.textContent=msg;n.style.display='block';
    clearTimeout(n._t);n._t=setTimeout(()=>n.style.display='none',dur);

  buildPreplayUI(){
    // Map grid
    const mg=document.getElementById('map-grid');
    mg.innerHTML='';
    MDEFS.forEach((m,i)=>{
      const c=document.createElement('div');
      c.className='mcard'+(i===this.selMap?' sel':'');
      c.innerHTML=`<div class="mcard-icon">${m.icon}</div><div class="mcard-name">${m.name}</div><div class="mcard-size">${m.size}</div>`;
      c.onclick=()=>{this.selMap=i;this.buildPreplayUI();};
      mg.appendChild(c);
    });
    // Diff
    const dr=document.getElementById('diff-row');
    dr.innerHTML='';
    const dColors={easy:'#44ff88',medium:'#ffcc00',hard:'#ff6644',extreme:'#ff00ff'};
    Object.entries(DIFFS).forEach(([k,v])=>{
      const c=document.createElement('div');
      c.className='dcard'+(k===this.selDiff?' sel':'');
      c.style.borderColor=k===this.selDiff?dColors[k]:'rgba(255,255,255,.1)';
      c.innerHTML=`<div class="dcard-name" style="color:${dColors[k]}">${v.label}</div><div class="dcard-desc">×${v.reward} coins</div>`;
      c.onclick=()=>{this.selDiff=k;this.buildPreplayUI();};
      dr.appendChild(c);
    });
    // Bot count
    const bcr=document.getElementById('bc-row');
    bcr.innerHTML='';
    [1,2,3,4,5,6].forEach(n=>{
      const c=document.createElement('div');
      c.className='bcbtn'+(n===this.selBots?' sel':'');
      c.textContent=n;
      c.onclick=()=>{this.selBots=n;this.buildPreplayUI();};
      bcr.appendChild(c);
    });
  },

  buildShopUI(){
    const cats=['all','pistol','rifle','sniper','shotgun','melee','special'];
    if(!this._shopCat)this._shopCat='all';
    const tabsEl=document.getElementById('cat-tabs');
    tabsEl.innerHTML='';
    cats.forEach(c=>{
      const t=document.createElement('div');
      t.className='cat-tab'+(c===this._shopCat?' active':'');
      t.textContent=c==='all'?'ALL':c.toUpperCase();
      t.onclick=()=>{this._shopCat=c;this.buildShopUI();};
      tabsEl.appendChild(t);
    });
    const grid=document.getElementById('shop-grid');
    grid.innerHTML='';
    document.getElementById('shop-coins-val').textContent=save.coins;
    WDEFS.filter(w=>this._shopCat==='all'||w.cat===this._shopCat).forEach(w=>{
      const owned=save.owned.includes(w.id);
      const equipped=Object.values(save.loadout).includes(w.id);
      const c=document.createElement('div');
      c.className='wcard'+(equipped?' equipped':owned?' owned':'');
      const pct=v=>Math.round(Math.min(100,v/10*4));
      c.innerHTML=`
        <div class="wcard-name">${w.name}</div>
        <div class="wcard-cat">${w.cat}</div>
        <div class="wcard-stat">DMG <b>${w.dmg}</b></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${pct(w.dmg)}%"></div></div>
        <div class="wcard-stat">RPM <b>${w.rpm}</b></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${Math.round(Math.min(100,w.rpm/15))}%"></div></div>
        <div class="wcard-stat">RANGE <b>${w.cat==='melee'?w.range+'m':w.range+'m'}</b></div>
        <div class="wcard-price ${w.price===0?'free':''}">${w.price===0?'FREE':'💰 '+w.price}</div>
        <div class="wcard-tag" style="color:${equipped?'#ff9944':owned?'#66ff66':'#888'}">${equipped?'EQUIPPED':owned?'OWNED':'BUY'}</div>
      `;
      if(!owned){
        c.onclick=()=>{
          if(save.coins>=w.price){save.coins-=w.price;save.owned.push(w.id);writeSave();this.buildShopUI();this.showNotif('Unlocked: '+w.name);}
          else this.showNotif('Not enough coins!');
        };
      }
      grid.appendChild(c);
    });
  },

  buildLoadoutUI(){
    const slots=[
      {key:'primary',  filter:w=>w.cat!=='melee',  nameEl:'lo-p-name',statsEl:'lo-p-stats',listEl:'lo-p-list'},
      {key:'secondary',filter:w=>['pistol','shotgun'].includes(w.cat),nameEl:'lo-s-name',statsEl:'lo-s-stats',listEl:'lo-s-list'},
      {key:'melee',    filter:w=>w.cat==='melee',  nameEl:'lo-m-name',statsEl:'lo-m-stats',listEl:'lo-m-list'},
    ];
    slots.forEach(slot=>{
      const cur=save.loadout[slot.key];
      const wdef=cur?WDEFS.find(w=>w.id===cur):null;
      document.getElementById(slot.nameEl).textContent=wdef?wdef.name:'—';
      document.getElementById(slot.statsEl).innerHTML=wdef?`DMG ${wdef.dmg} · RPM ${wdef.rpm} · MAG ${wdef.mag===Infinity?'∞':wdef.mag}`:'';
      const list=document.getElementById(slot.listEl);
      list.innerHTML='';
      WDEFS.filter(slot.filter).forEach(w=>{
        const owned=save.owned.includes(w.id);
        const sel=cur===w.id;
        const el=document.createElement('div');
        el.className='lo-item'+(sel?' sel':!owned?' lock':'');
        el.textContent=w.name+(owned?'':' 🔒');
        if(owned)el.onclick=()=>{save.loadout[slot.key]=w.id;writeSave();this.buildLoadoutUI();};
        list.appendChild(el);
      });
    });
  },

  // ---- MATCH ----
  startMatch(){
    this.matchKills=0;
    this.matchDmgDealt=0;
    this.playerHp=100;
    this.isReloading=false;
    this.scopeMode=false;
    document.getElementById('scope-ov').style.display='none';
    document.getElementById('reload-ind').style.display='none';

    const mdef=MDEFS[this.selMap];
    buildMap(mdef);

    const diff=DIFFS[this.selDiff];

    // Spawn player
    const sp=mdef.playerSpawn;
    this.playerPos.set(sp.x,0,sp.z);
    this.playerYaw=0;this.playerPitch=0;
    this.playerVel.set(0,0,0);
    camera.position.copy(this.playerPos);
    camera.position.y=this.EYE_HEIGHT;

    // Build weapons array from loadout
    this.weapons=[];
    const lo=save.loadout;
    if(lo.primary){const w=WDEFS.find(x=>x.id===lo.primary);if(w)this.weapons.push({...w,curMag:w.mag,totalAmmo:w.mag*3});}
    if(lo.secondary){const w=WDEFS.find(x=>x.id===lo.secondary);if(w)this.weapons.push({...w,curMag:w.mag,totalAmmo:w.mag*3});}
    if(lo.melee){const w=WDEFS.find(x=>x.id===lo.melee);if(w)this.weapons.push({...w,curMag:Infinity,totalAmmo:Infinity});}
    if(this.weapons.length===0){
      const glock=WDEFS.find(x=>x.id==='glock');
      this.weapons=[{...glock,curMag:glock.mag,totalAmmo:glock.mag*4}];
    }
    this.wepIndex=0;
    this.fireTimer=0;

    // Spawn bots
    this.bots=[];
    const spawnPts=mdef.spawnPts;
    for(let i=0;i<this.selBots;i++){
      const sp2=spawnPts[i%spawnPts.length];
      const jitter=new THREE.Vector3((Math.random()-.5)*3,0,(Math.random()-.5)*3);
      const bPos=new THREE.Vector3(sp2.x,0,sp2.z).add(jitter);
      this.bots.push(new Bot(bPos,diff,i));
    }

    // Weapon model
    this.updateWeaponModel();

    // Show HUD
    this.showScreen('s-dummy');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('hud').classList.add('active');
    this.state='playing';

    // Request pointer lock
    renderer.domElement.requestPointerLock();
    document.getElementById('ptr-msg').style.display='block';
    setTimeout(()=>document.getElementById('ptr-msg').style.display='none',2500);

    this.updateHUD();
    save.matches++;writeSave();
  },

  updateWeaponModel(){
    if(this.wepModel){scene.remove(this.wepModel);this.wepModel=null;}
    const w=this.weapons[this.wepIndex];
    if(!w)return;
    this.wepModel=buildWeaponModel(w);
    scene.add(this.wepModel);
  },

  endMatch(won,quit=false){
    if(this.state!=='playing')return;
    this.state='gameover';
    if(this.wepModel){scene.remove(this.wepModel);this.wepModel=null;}
    // Clear bots
    this.bots.forEach(b=>{if(b.alive)scene.remove(b.group);});
    this.bots=[];
    document.exitPointerLock();
    this.locked=false;

    let coins=0;
    const diff=DIFFS[this.selDiff];
    if(won){
      coins=Math.round((50+this.matchKills*25)*diff.reward);
      save.wins++;
      playWin();
    } else {
      coins=Math.round(this.matchKills*10*diff.reward);
      playLose();
    }
    save.coins+=coins;
    save.kills+=this.matchKills;
    writeSave();

    const title=document.getElementById('res-title');
    title.textContent=quit?'QUIT':won?'VICTORY':'DEFEAT';
    title.className=won?'r-win':'r-loss';
    document.getElementById('res-stats').innerHTML=`
      Eliminations: ${this.matchKills}<br>
      Damage Dealt: ${this.matchDmgDealt}<br>
      Coins Earned: +${coins}<br>
      Total Coins: ${save.coins}
    `;
    this.showScreen('s-over');
  },

  resume(){
    if(this.state!=='s-pause')return;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('hud').classList.add('active');
    this.state='playing';
    renderer.domElement.requestPointerLock();
  },

  // ---- COMBAT ----
  shoot(){
    const w=this.weapons[this.wepIndex];
    if(!w||this.isReloading)return;
    if(w.curMag<=0){this.startReload();return;}
    const now=performance.now();
    const minInterval=60000/w.rpm;
    if((now-this._lastShot)<minInterval)return;
    this._lastShot=now;

    w.curMag--;
    playShot(w);
    this.updateHUD();

    // Muzzle flash position
    if(this.wepModel){
      const wpos=new THREE.Vector3();
      this.wepModel.getWorldPosition(wpos);
      spawnMuzzleFlash(wpos);
    }

    // Weapon kick
    this._kick=.04;

    const isMelee=w.cat==='melee';
    const isShotgun=w.cat==='shotgun';

    if(isMelee){
      // Melee: short range raycast
      const ray=new THREE.Raycaster();
      ray.setFromCamera(new THREE.Vector2(0,0),camera);
      this.bots.forEach(bot=>{
        if(!bot.alive)return;
        const dist=camera.position.distanceTo(bot.group.position);
        if(dist<w.range){
          this.hitBot(bot,w.dmg,false);
        }
      });
      // Swing animation
      this._swingAnim=.2;
    } else if(isShotgun){
      const pellets=w.pellets||8;
      for(let i=0;i<pellets;i++){
        const spread=(1-w.acc)*.12;
        this.fireRay(w,spread);
      }
    } else {
      const spread=this.scopeMode?0:(1-w.acc)*.05;
      this.fireRay(w,spread);
    }

    if(w.curMag===0&&w.cat!=='melee')this.startReload();
  },

  fireRay(w,spread){
    const dir=new THREE.Vector3(
      (Math.random()-.5)*spread*2,
      (Math.random()-.5)*spread*2,
      -1
    );
    dir.normalize();
    dir.applyQuaternion(camera.quaternion);

    const ray=new THREE.Raycaster(camera.position.clone(),dir,0,w.range||200);
    // Check bots
    let hitBot=null,hitDist=Infinity;
    this.bots.forEach(bot=>{
      if(!bot.alive)return;
      // Simple sphere intersection
      const toBot=new THREE.Vector3().subVectors(bot.group.position,camera.position);
      toBot.y=BOT_HEIGHT/2;
      const proj=toBot.dot(dir);
      if(proj<0)return;
      const closest=new THREE.Vector3().copy(camera.position).addScaledVector(dir,proj);
      const dist=closest.distanceTo(new THREE.Vector3(bot.group.position.x,BOT_HEIGHT/2+bot.group.position.y,bot.group.position.z));
      if(dist<BOT_RADIUS*2&&proj<hitDist){
        hitDist=proj;hitBot=bot;
      }
    });

    if(hitBot){
      const isHead=hitDist<camera.position.distanceTo(hitBot.group.position)&&Math.random()<.15;
      this.hitBot(hitBot,w.dmg,isHead);
      spawnImpact(new THREE.Vector3().copy(camera.position).addScaledVector(dir,hitDist),isHead?0xffcccc:0xff9944);
    } else {
      // Impact on world
      const hits=ray.intersectObjects(mapObstacleMeshes);
      if(hits.length>0){
        spawnImpact(hits[0].point,0xaaaaaa);
      }
    }
  },

  hitBot(bot,dmg,isHead){
    this.matchDmgDealt+=isHead?dmg*2:dmg;
    bot.takeDamage(dmg,isHead);
    playHit();
    if(isHead){
      const ki=document.getElementById('kill-ind');
      ki.textContent='HEADSHOT!';ki.style.color='#ffdd00';ki.style.opacity=1;
      setTimeout(()=>ki.style.opacity=0,800);
    }
    if(!bot.alive){
      this.matchKills++;
      save.kills++;
      playKill();
      this.addKillFeed('ELIMINATED');
      const ki=document.getElementById('kill-ind');
      ki.textContent='ELIMINATED';ki.style.color='#ff3333';ki.style.opacity=1;
      setTimeout(()=>ki.style.opacity=0,900);
      this.updateHUD();
      // Check win
      if(this.bots.every(b=>!b.alive))setTimeout(()=>this.endMatch(true),800);
    }
  },

  addKillFeed(msg){
    const kf=document.getElementById('kfeed');
    const el=document.createElement('span');
    el.className='kmsg';el.textContent=msg;
    kf.appendChild(el);
    setTimeout(()=>el.remove(),2100);
  },

  startReload(){
    const w=this.weapons[this.wepIndex];
    if(!w||w.cat==='melee'||this.isReloading)return;
    if(w.totalAmmo===0)return;
    this.isReloading=true;
    this.reloadTimer=2.0-(w.rpm/2000);
    document.getElementById('reload-ind').style.display='block';
    playReload();
  },

  playerTakeDamage(dmg){
    this.playerHp=Math.max(0,this.playerHp-dmg);
    // Damage flash
    const ov=document.getElementById('dmg-ov');
    ov.style.opacity=1;setTimeout(()=>ov.style.opacity=0,200);
    this.updateHUD();
    if(this.playerHp<=0)this.endMatch(false);
  },

  // ---- MOVEMENT ----
  updatePlayer(dt){
    const speed=this.PLAYER_SPEED*(this.scopeMode?.5:1);
    const fwd=new THREE.Vector3(-Math.sin(this.playerYaw),0,-Math.cos(this.playerYaw));
    const right=new THREE.Vector3(Math.cos(this.playerYaw),0,-Math.sin(this.playerYaw));
    const moveVel=new THREE.Vector3();

    if(this.keys['KeyW']||this.keys['ArrowUp'])moveVel.addScaledVector(fwd,speed);
    if(this.keys['KeyS']||this.keys['ArrowDown'])moveVel.addScaledVector(fwd,-speed);
    if(this.keys['KeyA']||this.keys['ArrowLeft'])moveVel.addScaledVector(right,-speed);
    if(this.keys['KeyD']||this.keys['ArrowRight'])moveVel.addScaledVector(right,speed);

    // Gravity
    if(!this.onGround)this.playerVel.y-=this.GRAVITY*dt;
    else this.playerVel.y=Math.max(0,this.playerVel.y);

    // Apply horizontal movement with collision
    const newX=this.playerPos.x+moveVel.x*dt;
    const newZ=this.playerPos.z+moveVel.z*dt;

    if(!collidesWithObstacle(newX,this.playerPos.z,this.PLAYER_RADIUS)){
      const c=clampToBounds(newX,this.playerPos.z,this.PLAYER_RADIUS);
      this.playerPos.x=c.x;
    }
    if(!collidesWithObstacle(this.playerPos.x,newZ,this.PLAYER_RADIUS)){
      const c=clampToBounds(this.playerPos.x,newZ,this.PLAYER_RADIUS);
      this.playerPos.z=c.z;
    }

    // Vertical
    this.playerPos.y+=this.playerVel.y*dt;
    if(this.playerPos.y<=0){
      this.playerPos.y=0;
      this.playerVel.y=0;
      this.onGround=true;
    } else {
      this.onGround=false;
    }

    // Bobbing
    const moving=moveVel.length()>0.1&&this.onGround;
    if(moving){
      this._bobT=(this._bobT||0)+dt*12;
      this._bobAmt=Math.sin(this._bobT)*.04;
    } else {
      this._bobAmt=(this._bobAmt||0)*0.85;
    }

    // Update camera
    camera.position.set(this.playerPos.x,this.playerPos.y+this.EYE_HEIGHT+this._bobAmt,this.playerPos.z);
    camera.rotation.order='YXZ';
    camera.rotation.y=this.playerYaw;
    camera.rotation.x=this.playerPitch;

    // Weapon kick
    if(this._kick>0){
      this._kick=Math.max(0,this._kick-.1);
      camera.rotation.x-=this._kick*.3;
    }

    // Swing animation for melee
    if(this._swingAnim>0){
      this._swingAnim-=dt;
      camera.rotation.x-=Math.sin(this._swingAnim*Math.PI/.2)*.3;
    }

    // Update weapon model (attached to camera)
    if(this.wepModel){
      const w=this.weapons[this.wepIndex];
      const isMelee=w&&w.cat==='melee';
      const offset=new THREE.Vector3(.2,-.18,-.35);
      if(this.scopeMode)offset.set(0,-.1,-.3);
      this.wepModel.position.copy(camera.position).add(
        offset.clone().applyEuler(new THREE.Euler(camera.rotation.x,camera.rotation.y,0,'YXZ'))
      );
      this.wepModel.rotation.copy(camera.rotation);
      if(isMelee&&this._swingAnim>0){
        this.wepModel.rotation.x+=Math.sin(this._swingAnim*Math.PI/.2)*.8;
      }
    }

    // Auto fire
    const w=this.weapons[this.wepIndex];
    if(this.mouseDown&&w&&w.auto&&!this.isReloading)this.shoot();

    // Reload timer
    if(this.isReloading){
      this.reloadTimer-=dt;
      if(this.reloadTimer<=0){
        const ww=this.weapons[this.wepIndex];
        if(ww&&ww.cat!=='melee'){
          const needed=ww.mag-ww.curMag;
          const from=Math.min(needed,ww.totalAmmo===Infinity?needed:ww.totalAmmo);
          ww.curMag+=from;
          if(ww.totalAmmo!==Infinity)ww.totalAmmo-=from;
        }
        this.isReloading=false;
        document.getElementById('reload-ind').style.display='none';
        this.updateHUD();
      }
    }
  },

  updateBots(dt){
    const playerBox=new THREE.Box3(
      new THREE.Vector3(this.playerPos.x-this.PLAYER_RADIUS,this.playerPos.y,this.playerPos.z-this.PLAYER_RADIUS),
      new THREE.Vector3(this.playerPos.x+this.PLAYER_RADIUS,this.playerPos.y+1.8,this.playerPos.z+this.PLAYER_RADIUS)
    );
    const eyePos=new THREE.Vector3(this.playerPos.x,this.playerPos.y+this.EYE_HEIGHT,this.playerPos.z);
    this.bots.forEach(b=>b.update(dt,eyePos,playerBox));
  },

  updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
      if(!particles[i].update(dt)){particles[i].destroy();particles.splice(i,1);}
    }
  },

  updateHUD(){
    if(this.state!=='playing')return;
    document.getElementById('hp-fill').style.width=(this.playerHp/this.playerMaxHp*100)+'%';
    document.getElementById('hp-val').textContent=this.playerHp;
    const w=this.weapons[this.wepIndex];
    if(w){
      document.getElementById('ammo-c').textContent=w.cat==='melee'?'∞':(w.curMag||0);
      document.getElementById('ammo-m').textContent=w.cat==='melee'?'':`/ ${w.totalAmmo===Infinity?'∞':w.totalAmmo}`;
      document.getElementById('wep-name').textContent=w.name.toUpperCase();
    }
    document.getElementById('hud-coins').textContent=save.coins;
    const alive=this.bots.filter(b=>b.alive).length;
    document.getElementById('bots-alive').textContent=alive;
  },

  // ---- INPUT ----
  setupInput(){
    document.addEventListener('keydown',e=>{
      this.keys[e.code]=true;
      if(this.state==='playing'){
        if(e.code==='KeyR')this.startReload();
        if(e.code==='Digit1'||e.code==='Numpad1')this.switchWeapon(0);
        if(e.code==='Digit2'||e.code==='Numpad2')this.switchWeapon(1);
        if(e.code==='Digit3'||e.code==='Numpad3')this.switchWeapon(2);
        if(e.code==='Space'&&this.onGround){this.playerVel.y=this.JUMP_VEL;this.onGround=false;}
        if(e.code==='Escape'){
          document.exitPointerLock();
          this.showScreen('s-pause');
        }
      }
    });
    document.addEventListener('keyup',e=>{this.keys[e.code]=false;});

    document.addEventListener('mousedown',e=>{
      if(this.state==='playing'&&this.locked){
        if(e.button===0){
          this.mouseDown=true;
          const w=this.weapons[this.wepIndex];
          if(!w||!w.auto)this.shoot();
        }
        if(e.button===2){
          const w=this.weapons[this.wepIndex];
          if(w&&w.scope){
            this.scopeMode=!this.scopeMode;
            document.getElementById('scope-ov').style.display=this.scopeMode?'block':'none';
            camera.fov=this.scopeMode?30:72;
            camera.updateProjectionMatrix();
          }
        }
      }
    });
    document.addEventListener('mouseup',e=>{if(e.button===0)this.mouseDown=false;});
    document.addEventListener('contextmenu',e=>e.preventDefault());

    document.addEventListener('mousemove',e=>{
      if(this.state!=='playing'||!this.locked)return;
      const sens=this.scopeMode?.0005:.002;
      this.playerYaw-=e.movementX*sens;
      this.playerPitch-=e.movementY*sens;
      this.playerPitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,this.playerPitch));
    });

    document.addEventListener('wheel',e=>{
      if(this.state!=='playing')return;
      const dir=e.deltaY>0?1:-1;
      this.switchWeapon((this.wepIndex+dir+this.weapons.length)%this.weapons.length);
    });

    document.addEventListener('pointerlockchange',()=>{
      this.locked=document.pointerLockElement===renderer.domElement;
      if(this.locked){document.getElementById('ptr-msg').style.display='none';}
      else if(this.state==='playing'){document.getElementById('ptr-msg').style.display='block';}
    });

    renderer.domElement.addEventListener('click',()=>{
      if(this.state==='playing'&&!this.locked)renderer.domElement.requestPointerLock();
    });
  },

  switchWeapon(idx){
    if(idx<0||idx>=this.weapons.length)return;
    this.wepIndex=idx;
    this.isReloading=false;
    document.getElementById('reload-ind').style.display='none';
    if(this.scopeMode){
      this.scopeMode=false;
      document.getElementById('scope-ov').style.display='none';
      camera.fov=72;camera.updateProjectionMatrix();
    }
    this.updateWeaponModel();
    this.updateHUD();
  },

  // ---- RENDER LOOP ----
  renderLoop(time){
    this.animId=requestAnimationFrame(t=>this.renderLoop(t));
    const dt=Math.min(.05,(time-this.lastTime)/1000);
    this.lastTime=time;

    if(this.state==='playing'){
      this.updatePlayer(dt);
      this.updateBots(dt);
      this.updateParticles(dt);
      this.updateHUD();
    }

    renderer.render(scene,camera);
  },
};

// Init game
G._lastShot=0;
G._kick=0;
G._bobT=0;
G._bobAmt=0;
G._swingAnim=0;
G._shopCat='all';
G.init();
</script>
